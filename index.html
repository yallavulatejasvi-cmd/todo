<!DOCTYPE html>
<html>
<head>
  <title>Priority Flow To-Do</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="theme-sunset">

  <div class="app">
    <div class="top-bar">
      <div>
        <h1>Priority Flow To-Do</h1>
        <p class="subtitle">Plan tasks, subtasks, deadlines, and progress clearly.</p>
      </div>

      <div class="theme-box">
        <label>Theme</label>
        <select id="themeSelect" onchange="changeTheme()">
          <option value="theme-sunset">Sunset</option>
          <option value="theme-mint">Mint</option>
          <option value="theme-lavender">Lavender</option>
          <option value="theme-dark">Dark</option>
        </select>
      </div>
    </div>

    <div class="task-form">
      <h2>Add New Task</h2>

      <div class="form-grid">
        <input id="taskInput" type="text" placeholder="Main task">

        <select id="priorityInput">
          <option value="1">High Priority</option>
          <option value="2">Medium Priority</option>
          <option value="3">Low Priority</option>
        </select>

        <input id="dateInput" type="date">
        <input id="timeInput" type="time">
      </div>

      <h3>Subtasks</h3>

      <div id="subtaskInputs">
        <div class="subtask-row">
          <input class="subtask-name" type="text" placeholder="Subtask">
          <input class="subtask-date" type="date">
          <input class="subtask-time" type="time">
        </div>
      </div>

      <div class="form-buttons">
        <button onclick="addSubtaskInput()">+ Add Subtask</button>
        <button onclick="addTask()">Add Main Task</button>
      </div>
    </div>

    <div id="flowBoard" class="flow-board"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
